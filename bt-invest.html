var FH = "d0dco69r01qhup5k9pegd0dco69r01qhup5k9pf0";
async function fhFetch(url) {
  try {
    var ctrl = new AbortController();
    setTimeout(function(){ ctrl.abort(); }, 8000);
    var r = await fetch(url, { signal: ctrl.signal });
    if(r.ok) return await r.json();
  } catch(e) {}
  return null;
}
const SECTORS = [
  {full:"Technology",  short:"Tech"},
  {full:"Healthcare",  short:"Health"},
  {full:"Finance",     short:"Fin"},
  {full:"Energy",      short:"Energy"},

  {full:"Industrial",  short:"Ind"},

  {full:"Crypto",      short:"Crypto"},
  {full:"Boshqa",      short:"Other"},
];
function secShort(full){ var s=SECTORS.find(function(x){return x.full===full;}); return s?s.short:(full||"?"); }
function secFull(full){ return full; }
const FLAGS = ["🇺🇸","🇬🇧","🇪🇺","🇯🇵","🇰🇷","🇲🇾","🇺🇿","🇹🇷","🇸🇱","🇰🇼","🇧🇭"];

const f2  = function(n){ return (n==null||isNaN(n)) ? "--" : Number(n).toFixed(2); };
const fp  = function(n){ return (n==null||isNaN(n)) ? "--" : (n>0?"+":"")+Number(n).toFixed(2)+"%"; };
const fv  = function(n){ if(!n) return "--"; if(n>=1e9) return (n/1e9).toFixed(2)+"B"; if(n>=1e6) return (n/1e6).toFixed(1)+"M"; return (n/1e3).toFixed(0)+"K"; };

// Mamlakat kodi → bayroq emoji
var COUNTRY_FLAG = {
  "US":"🇺🇸","GB":"🇬🇧","EU":"🇪🇺","JP":"🇯🇵","KR":"🇰🇷",
  "MY":"🇲🇾","UZ":"🇺🇿","TR":"🇹🇷","SL":"🇸🇱","KW":"🇰🇼",

  "CH":"🇨🇭","NL":"🇳🇱","IT":"🇮🇹","ES":"🇪🇸","BR":"🇧🇷",
  "RU":"🇷🇺","ZA":"🇿🇦","MX":"🇲🇽","NG":"🇳🇬","SA":"🇸🇦",

};

function countryToFlag(code) {
  if(!code) return "🇺🇸";
  return COUNTRY_FLAG[code.toUpperCase()] || "🏳️";
}

// Finnhub orqali narx olish
async function fetchQuote(symbol) {
  try {
    // Narx va kompaniya profili parallel
    var [q, profile] = await Promise.all([
      fhFetch("https://finnhub.io/api/v1/quote?symbol="+symbol+"&token="+FH),
      fhFetch("https://finnhub.io/api/v1/stock/profile2?symbol="+symbol+"&token="+FH),
    ]);
    if(!q || !q.c || q.c === 0) return null;

    // Davlat bayrog'i
    var flag = profile && profile.country ? countryToFlag(profile.country) : "🇺🇸";

    // Kecha foizi uchun kunlik candle
    var yesterdayChgPct = null;
    try {
      var now  = Math.floor(Date.now()/1000);
      var from = now - 8*24*3600;
      var cd   = await fhFetch("https://finnhub.io/api/v1/stock/candle?symbol="+symbol+"&resolution=D&from="+from+"&to="+now+"&token="+FH);
      if(cd && cd.c && cd.c.length >= 3){
        var n = cd.c.length;
        var y1 = cd.c[n-2], y2 = cd.c[n-3];
        if(y1 && y2) yesterdayChgPct = ((y1-y2)/y2)*100;
      }
    } catch(e2){}

    return {
      symbol:   symbol,
      price:    q.c,
      open:     q.o,
      prevClose:q.pc,
      change:   q.d,
      changePct:q.dp,
      yesterdayChgPct: yesterdayChgPct,
      preMarket: null, preChange: null,
      postMarket:null, postChange:null,
      high:  q.h,  low: q.l,
      volume:null,
      flag: flag,
      updated: new Date(),
    };
  } catch(e){ return null; }
}

// ── MINI PRICE ────────────────────────────────────────────────────────
function MiniPrice(props) {
  var T = props.T;
  if(!props.value) return null;
  var c = props.pct >= 0 ? T.green : T.red;
  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1 }}>
      <span style={{ fontSize:8,color:T.textSub,textTransform:"uppercase",letterSpacing:1 }}>{props.label}</span>
      <span style={{ fontSize:11,fontWeight:700,color:T.text }}>${f2(props.value)}</span>
      <span style={{ fontSize:10,color:c }}>{fp(props.pct)}</span>
    </div>
  );
}

// ── HALAL BADGE ───────────────────────────────────────────────────────
function HalalBadge(props) {
  var T = props.T;
  var opts = [
    { val:true,  label:"Halol",    bg:"rgba(5,150,105,0.15)",  color:T.green, border:T.green },
    { val:false, label:"Not Halal",bg:"rgba(220,38,38,0.13)",  color:T.red,   border:T.red   },
    { val:null,  label:"Noma'lum", bg:T.halalUnk.bg, color:T.halalUnk.col, border:T.halalUnk.bor },
  ];
  var cur = opts.find(function(o){ return o.val === props.status; }) || opts[2];
  return (
    <span style={{
      color:cur.color, fontSize:12, fontWeight:400, whiteSpace:"nowrap", opacity:0.85,
    }}>{cur.label}</span>
  );
}

// ── SECTOR PILL ───────────────────────────────────────────────────────
function SectorPill(props) {
  var T = props.T;
  return (
    <span style={{
      color:T.textSub, fontSize:12, fontWeight:400, whiteSpace:"nowrap", opacity:0.85,
    }}>{secShort(props.sector)}</span>
  );
}

// ── STOCK ROW ─────────────────────────────────────────────────────────
var HOLD_MS = 2000;

function StockRow(props) {
  var q = props.q; var m = props.m; var T = props.T; var dark = props.dark;
  var _en    = useState(false); var editNote = _en[0];  var setEditNote = _en[1];
  var _nv    = useState(m.note||""); var noteVal = _nv[0]; var setNoteVal = _nv[1];
  var _flash = useState(false); var flash = _flash[0];   var setFlash    = _flash[1];
  var _prog  = useState(0);     var prog  = _prog[0];    var setProg     = _prog[1];
  var _holding = useState(false); var holding = _holding[0]; var setHolding = _holding[1];
  var _confirm = useState(false); var confirm = _confirm[0]; var setConfirm = _confirm[1];

  var holdTimer  = useRef(null);
  var progTimer  = useRef(null);
  var startTime  = useRef(null);
  var prevPrice  = useRef(null);

  // Flash when price changes
  useEffect(function(){
    if(!q) return;
    if(prevPrice.current !== null && prevPrice.current !== q.price){
      setFlash(true);
      var t = setTimeout(function(){ setFlash(false); }, 600);
      return function(){ clearTimeout(t); };
    }
    prevPrice.current = q.price;
  }, [q && q.price]);

  function startHold(e) {
    e.preventDefault();
    startTime.current = Date.now();
    setHolding(true);
    setProg(0);
    // Smooth progress animation
    progTimer.current = setInterval(function(){
      var elapsed = Date.now() - startTime.current;
      var p = Math.min(100, (elapsed / HOLD_MS) * 100);
      setProg(p);
    }, 30);
    // Trigger after HOLD_MS
    holdTimer.current = setTimeout(function(){
      clearInterval(progTimer.current);
      setProg(100);
      setHolding(false);
      setConfirm(true);
    }, HOLD_MS);
  }

  function cancelHold() {
    clearTimeout(holdTimer.current);
    clearInterval(progTimer.current);
    setHolding(false);
    setProg(0);
  }

  var cc = q && q.change >= 0 ? T.green : T.red;
  // Progress ring params
  var R = 20; var CIRC = 2 * Math.PI * R;
  var dash = (prog / 100) * CIRC;

  // Determine market session
  var isPreMarket  = q && q.preMarket  && !q.postMarket;
  var isPostMarket = q && q.postMarket;
  var extPrice     = isPostMarket ? q.postMarket : (isPreMarket ? q.preMarket : null);
  var extPct       = isPostMarket ? q.postChange : (isPreMarket ? q.preChange  : null);
  var extLabel     = isPostMarket ? "After Hours"  : (isPreMarket ? "Pre-Market"  : null);

  return (
    <div
      onMouseDown={startHold}
      onMouseUp={cancelHold}
      onMouseLeave={cancelHold}
      onTouchStart={startHold}
      onTouchEnd={cancelHold}
      onTouchCancel={cancelHold}
      style={{
        background: confirm ? T.red+"15" : flash ? (q&&q.change>=0 ? T.green+"18" : T.red+"18") : "transparent",
        borderBottom: "1px solid " + T.divider,
        padding:"11px 4px", marginBottom:0,
        transition:"background .4s",
        position:"relative", userSelect:"none",
        cursor: holding ? "grabbing" : "default",
      }}>

      {/* HOLD PROGRESS RING — top right */}
      {holding && (
        <div style={{ position:"absolute", top:10, right:6, zIndex:10,
          display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
          <svg width={38} height={38} style={{ transform:"rotate(-90deg)" }}>
            <circle cx={19} cy={19} r={R} fill="none" stroke={T.red+"33"} strokeWidth={3}/>
            <circle cx={19} cy={19} r={R} fill="none" stroke={T.red}
              strokeWidth={3} strokeLinecap="round"
              strokeDasharray={CIRC} strokeDashoffset={CIRC - dash}
              style={{ transition:"stroke-dashoffset .03s linear" }}/>
          </svg>
          <span style={{ position:"absolute", fontSize:11, fontWeight:800, color:T.red }}>
            {Math.ceil((HOLD_MS-(prog/100)*HOLD_MS)/1000)}
          </span>
        </div>
      )}

      {/* ACTION PANEL — 2s bosgandan keyin chiqadi */}
      {confirm && (
        <>
          {/* Tashqariga bossangiz yopiladi */}
          <div
            onMouseDown={function(e){e.stopPropagation();setConfirm(false);setProg(0);}}
            onTouchStart={function(e){e.stopPropagation();setConfirm(false);setProg(0);}}
            style={{ position:"fixed", inset:0, zIndex:20 }}/>

          <div
            onMouseDown={function(e){e.stopPropagation();}}
            onTouchStart={function(e){e.stopPropagation();}}
            style={{
              position:"absolute", top:0, left:0, right:0,
              background: dark ? "rgba(15,10,5,0.97)" : "rgba(255,253,245,0.97)",
              border:"1px solid "+T.cardBorder,
              borderRadius:12, padding:"10px 12px",
              zIndex:25, boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
              animation:"fadeIn .15s ease",
            }}>

            {/* Sarlavha: symbol + yopish */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:15, fontWeight:800, color:T.text }}>
                {m.symbol}
              </span>
              <button
                onMouseDown={function(e){e.stopPropagation(); setConfirm(false); setProg(0);}}
                onTouchStart={function(e){e.stopPropagation(); setConfirm(false); setProg(0);}}
                style={{ background:"none", border:"none", color:T.textSub,
                  fontSize:18, cursor:"pointer", padding:"0 4px", lineHeight:1 }}>×</button>
            </div>

            {/* Halolik */}
            <div style={{ marginBottom:8 }}>
              <div style={{ fontSize:9, color:T.textFaint, textTransform:"uppercase", letterSpacing:1, marginBottom:5 }}>Halolik</div>
              <div style={{ display:"flex", gap:6 }}>
                {[{val:true,label:"Halol",col:T.green},{val:false,label:"Not Halal",col:T.red},{val:null,label:"Noma'lum",col:T.textSub}].map(function(o){
                  var active = m.halal === o.val;
                  return (
                    <button key={String(o.val)}
                      onMouseDown={function(e){e.stopPropagation(); props.upd(m.symbol,"halal",o.val);}}
                      onTouchStart={function(e){e.stopPropagation(); props.upd(m.symbol,"halal",o.val);}}
                      style={{
                        background: active ? o.col+"22" : T.input,
                        border:"1px solid "+(active ? o.col : T.cardBorder),
                        color: active ? o.col : T.textSub,
                        borderRadius:8, padding:"5px 10px",
                        fontSize:11, fontWeight: active?700:400, cursor:"pointer",
                      }}>{o.label}</button>
                  );
                })}
              </div>
            </div>

            {/* Sektor */}
            <div style={{ marginBottom:10 }}>
              <div style={{ fontSize:9, color:T.textFaint, textTransform:"uppercase", letterSpacing:1, marginBottom:5 }}>Sektor</div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {SECTORS.map(function(s){
                  var active = m.sector === s.full;
                  return (
                    <button key={s.full}
                      onMouseDown={function(e){e.stopPropagation(); props.upd(m.symbol,"sector",s.full);}}
                      onTouchStart={function(e){e.stopPropagation(); props.upd(m.symbol,"sector",s.full);}}
                      style={{
                        background: active ? T.purple+"22" : T.input,
                        border:"1px solid "+(active ? T.purple : T.cardBorder),
                        color: active ? T.purple : T.textSub,
                        borderRadius:20, padding:"4px 10px",
                        fontSize:11, fontWeight: active?700:400, cursor:"pointer",
                      }}>{s.short}</button>
                  );
                })}
              </div>
            </div>

            {/* Bayroq */}
            <div style={{ marginBottom:10 }}>
              <div style={{ fontSize:9, color:T.textFaint, textTransform:"uppercase", letterSpacing:1, marginBottom:5 }}>Bayroq</div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {FLAGS.map(function(f){
                  var active = m.flag === f;
                  return (
                    <button key={f}
                      onMouseDown={function(e){e.stopPropagation(); props.upd(m.symbol,"flag",f);}}
                      onTouchStart={function(e){e.stopPropagation(); props.upd(m.symbol,"flag",f);}}
                      style={{
                        background: active ? T.purple+"22" : "transparent",
                        border: "1px solid " + (active ? T.purple : "transparent"),
                        borderRadius:8, padding:"2px 4px",
                        fontSize:20, cursor:"pointer", lineHeight:1,
                      }}>{f}</button>
                  );
                })}
              </div>
            </div>

            {/* O'chirish tugmasi */}
            <button
              onMouseDown={function(e){e.stopPropagation(); props.onRemove();}}
              onTouchStart={function(e){e.stopPropagation(); props.onRemove();}}
              style={{
                width:"100%", background:T.red+"18",
                border:"1px solid "+T.red+"66",
                color:T.red, borderRadius:8, padding:"8px",
                fontSize:12, fontWeight:700, cursor:"pointer",
              }}>✕ O'chirish</button>
          </div>
        </>
      )}

      {/* MAIN ROW — TradingView layout */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>

        {/* FLAG + LEFT */}
        <div style={{ display:"flex", alignItems:"flex-start", gap:8, flex:1, minWidth:0 }}>

          {/* Davlat bayrog'i emoji */}
          <div style={{ flexShrink:0, marginTop:1, fontSize:20, lineHeight:1, cursor:"default" }}>
            {m.flag || "🇺🇸"}
          </div>

        {/* LEFT: symbol + badges */}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:22, fontWeight:900,
              color: confirm ? T.red : T.text, letterSpacing:1 }}>
              {m.symbol}
            </span>
            <HalalBadge status={m.halal} onChange={function(v){props.upd(m.symbol,"halal",v);}} T={T}/>
            <SectorPill sector={m.sector} onChange={function(v){props.upd(m.symbol,"sector",v);}} T={T}/>
          </div>

          {/* Note */}
          <div style={{ marginTop:3 }}>
            {editNote ? (
              <input autoFocus value={noteVal}
                onMouseDown={function(e){e.stopPropagation();}}
                onTouchStart={function(e){e.stopPropagation();}}
                onChange={function(e){setNoteVal(e.target.value);}}
                onBlur={function(){props.upd(m.symbol,"note",noteVal);setEditNote(false);}}
                onKeyDown={function(e){if(e.key==="Enter"){props.upd(m.symbol,"note",noteVal);setEditNote(false);}}}
                placeholder="Eslatma..."
                style={{ background:T.input, border:"1px solid "+T.inputBor,
                  color:T.text, borderRadius:6, padding:"3px 7px", fontSize:10,
                  outline:"none", width:"90%" }}
              />
            ) : noteVal ? (
              <div onMouseDown={function(e){e.stopPropagation();setEditNote(true);}}
                onTouchStart={function(e){e.stopPropagation();setEditNote(true);}}
                style={{ fontSize:10, color:T.textSub, fontStyle:"italic", cursor:"text" }}>
                {noteVal}
              </div>
            ) : null}
          </div>
        </div>
        </div>{/* FLAG + LEFT wrapper end */}

        {/* RIGHT: prices — TradingView exact style */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:1, flexShrink:0, minWidth:110 }}>

          {/* Katta narx */}
          <span style={{
            fontFamily:"'JetBrains Mono',monospace", fontSize:22, fontWeight:800,
            color: flash ? cc : T.text, transition:"color .3s", letterSpacing:-0.5, lineHeight:1.1,
          }}>
            {q ? f2(q.price) : "—"}
          </span>

          {/* Bugungi delta + foiz (yonma-yon) */}
          {q && (
            <div style={{ display:"flex", gap:5, alignItems:"center" }}>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:12, color:cc, fontWeight:600 }}>
                {q.change>=0?"+":""}{f2(q.change)}
              </span>
              <span style={{ fontSize:12, color:cc, fontWeight:700 }}>
                {fp(q.changePct)}
              </span>
            </div>
          )}

          {/* Pre / After-hours: oy belgisi + narx + delta + foiz */}
          {extPrice && (
            <div style={{ display:"flex", alignItems:"center", gap:3, marginTop:1 }}>
              <span style={{ fontSize:11, color:"#6366f1", lineHeight:1 }}>&#9691;</span>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:11, fontWeight:600, color:T.textSub }}>
                {f2(extPrice)}
              </span>
              <span style={{ fontSize:11, fontWeight:700, color: extPct>=0 ? T.green : T.red }}>
                {extPct>=0?"+":""}{f2(extPrice-(q?q.price:0))}
              </span>
              <span style={{ fontSize:11, fontWeight:700, color: extPct>=0 ? T.green : T.red }}>
                {fp(extPct)}
              </span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

var BT_COLORS = [
  {text:"#f59e0b", sub:"#92400e", grad:"linear-gradient(90deg,#92400e,#f59e0b,#fef08a,#f59e0b,#92400e)"},
  {text:"#818cf8", sub:"#4338ca", grad:"linear-gradient(90deg,#4338ca,#818cf8,#c7d2fe,#818cf8,#4338ca)"},

  {text:"#f43f5e", sub:"#9f1239", grad:"linear-gradient(90deg,#9f1239,#f43f5e,#fda4af,#f43f5e,#9f1239)"},
  {text:"#3b82f6", sub:"#1e3a8a", grad:"linear-gradient(90deg,#1e3a8a,#3b82f6,#bfdbfe,#3b82f6,#1e3a8a)"},

  {text:"#fb923c", sub:"#7c2d12", grad:"linear-gradient(90deg,#7c2d12,#fb923c,#fed7aa,#fb923c,#7c2d12)"},
  {text:"#84cc16", sub:"#365314", grad:"linear-gradient(90deg,#365314,#84cc16,#ecfccb,#84cc16,#365314)"},
];
var BT_EFFECTS = ["shimmer","neon","glitch","flip3d","particle","wave"];

function BTTitle() {
  var _ci = useState(0); var ci = _ci[0]; var setCi = _ci[1];

  var col = BT_COLORS[0];
  var eff = "flip3d";

  // Faqat rang har 3s da almashadi
  useEffect(function(){
    var t = setInterval(function(){
      setCi(function(c){ return (c+1)%BT_COLORS.length; });
    }, 3000);
    return function(){ clearInterval(t); };
  },[]);

  var baseStyle = {
    fontFamily:"'Cinzel Decorative',serif",
    fontSize:56, fontWeight:700, lineHeight:1, letterSpacing:12,
    display:"inline-block", transition:"color .8s",
  };

  function renderBT() {
    if(eff==="shimmer") {
      return (
        <span style={{...baseStyle,
          background:col.grad, backgroundSize:"200% auto",
          WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
          animation:"btShimmer 2s linear infinite",
        }}>BT</span>
      );
    }
    if(eff==="neon") {
      return (
        <span style={{...baseStyle, color:col.text,
          animation:"btNeon 1.5s ease-in-out infinite",
          "--nc":col.text,
        }}>BT</span>
      );
    }
    if(eff==="glitch") {
      return (
        <span style={{position:"relative", display:"inline-block"}}>
          <span style={{...baseStyle, color:col.text}}>BT</span>
          <span style={{...baseStyle, position:"absolute",top:0,left:0,color:"#ef4444",animation:"btG1 0.5s infinite",opacity:0.7}}>BT</span>
          <span style={{...baseStyle, position:"absolute",top:0,left:0,color:"#3b82f6",animation:"btG2 0.5s infinite",opacity:0.7}}>BT</span>
        </span>
      );
    }
    if(eff==="flip3d") {
      return (
        <span style={{...baseStyle, color:col.text,
          background:col.grad, backgroundSize:"200% auto",
          WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
          animation:"btFlip 2.5s ease-in-out infinite",
        }}>BT</span>
      );
    }
    if(eff==="particle") {
      return (
        <span style={{position:"relative", display:"inline-block", padding:"0 8px"}}>
          {Array.from({length:8},function(_,i){
            var a=(i/8)*360;
            return <span key={i} style={{
              position:"absolute", top:"40%", left:"50%",
              width:4, height:4, borderRadius:"50%",
              background:i%2===0?col.text:col.sub,
              "--tx":Math.cos(a*Math.PI/180)*28+"px",
              "--ty":Math.sin(a*Math.PI/180)*28+"px",
              animation:"btPart 1.2s ease-out infinite",
              animationDelay:(i*0.15)+"s",
            }}/>;
          })}
          <span style={{...baseStyle, color:col.text, position:"relative"}}>BT</span>
        </span>
      );
    }
    if(eff==="wave") {
      return (
        <span style={{display:"inline-flex", gap:0}}>
          {["B","T"].map(function(l,i){
            return <span key={l} style={{...baseStyle,
              color:col.text,
              animation:"btWave 1s ease-in-out infinite",
              animationDelay:(i*0.2)+"s",
            }}>{l}</span>;
          })}
        </span>
      );
    }
    return <span style={{...baseStyle, color:col.text}}>BT</span>;
  }

  return (
    <div style={{cursor:"default", userSelect:"none", minWidth:90}}>
      <style>{`
        @keyframes btShimmer{0%{background-position:0%}100%{background-position:200%}}
        @keyframes btNeon{0%,100%{text-shadow:0 0 8px var(--nc),0 0 20px var(--nc)}50%{text-shadow:0 0 4px var(--nc),0 0 60px var(--nc),0 0 100px var(--nc)}}
        @keyframes btG1{0%,100%{clip-path:inset(0 0 90% 0);transform:translate(-3px)}50%{clip-path:inset(40% 0 30% 0);transform:translate(3px)}}
        @keyframes btG2{0%,100%{clip-path:inset(55% 0 20% 0);transform:translate(3px)}50%{clip-path:inset(10% 0 65% 0);transform:translate(-3px)}}
        @keyframes btFlip{0%{transform:perspective(400px) rotateY(0)}50%{transform:perspective(400px) rotateY(180deg)}100%{transform:perspective(400px) rotateY(360deg)}}
        @keyframes btPart{0%{transform:translate(0,0);opacity:1}100%{transform:translate(var(--tx),var(--ty));opacity:0}}
        @keyframes btWave{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes investPulse{0%,100%{opacity:0.5;letter-spacing:10px}50%{opacity:1;letter-spacing:16px}}
      `}</style>
      {renderBT()}
      <div style={{fontSize:10, letterSpacing:10, marginTop:4, textTransform:"uppercase",
        color:col.sub, animation:"investPulse 3s ease-in-out infinite"}}>INVEST</div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────
function App() {
  var _dark    = useState(false);          var dark        = _dark[0];        var setDark        = _dark[1];
  var _stocks  = useState(DEFAULT_STOCKS); var stocks      = _stocks[0];      var setStocks      = _stocks[1];
  var _quotes  = useState({});             var quotes      = _quotes[0];      var setQuotes      = _quotes[1];
  var _newSym  = useState("");             var newSym      = _newSym[0];      var setNewSym      = _newSym[1];
  var _newSec  = useState("Boshqa");       var newSec      = _newSec[0];      var setNewSec      = _newSec[1];
  var _newHal  = useState(null);           var newHalal    = _newHal[0];      var setNewHalal    = _newHal[1];
  var _newFlg  = useState("🇺🇸");          var newFlag     = _newFlg[0];      var setNewFlag     = _newFlg[1];
  var _loading = useState(false);          var loading     = _loading[0];     var setLoading     = _loading[1];
  var _last    = useState(null);           var lastRefresh = _last[0];        var setLastRefresh = _last[1];
  var _filter  = useState("");             var filter      = _filter[0];      var setFilter      = _filter[1];
  var _sk      = useState("symbol");       var sortKey     = _sk[0];          var setSortKey     = _sk[1];
  var _sd      = useState(1);              var sortDir     = _sd[0];          var setSortDir     = _sd[1];
  var _st      = useState("Hammasi");      var sectorTab   = _st[0];          var setSectorTab   = _st[1];
  var _ht      = useState("Hammasi");      var halalTab    = _ht[0];          var setHalalTab    = _ht[1];
  var _tf      = useState(false);          var titleFlipped= _tf[0];          var setTitleFlipped= _tf[1];
  var _ticker  = useState(0);              var ticker      = _ticker[0];      var setTicker      = _ticker[1];
  var _ao      = useState(false);          var addOpen     = _ao[0];          var setAddOpen     = _ao[1];
  var addInputRef    = useRef(null);

  var T = dark ? DARK : LIGHT;
  var stocksRef = useRef(stocks);
  useEffect(function(){ stocksRef.current = stocks; }, [stocks]);

  useEffect(function(){
    if(addOpen && addInputRef.current) addInputRef.current.focus();
  }, [addOpen]);

  // Fast refresh — fetch one symbol at a time in rotation to avoid rate limits
  var idxRef = useRef(0);
  var fetchOne = useCallback(async function() {
    var syms = stocksRef.current;
    if(!syms.length) return;
    var sym = syms[idxRef.current % syms.length].symbol;
    idxRef.current = (idxRef.current + 1) % syms.length;
    var q = await fetchQuote(sym);
    if(q) {
      setQuotes(function(prev){ return Object.assign({}, prev, { [sym]: q }); });
      setLastRefresh(new Date());
      // Bayroqni avtomatik yangilash
      if(q.flag) {
        setStocks(function(prev){ return prev.map(function(s){
          return s.symbol===sym && s.flag===s.flag ? Object.assign({},s,{flag:q.flag}) : s;
        });});
      }
    }
  }, []);

  // Full refresh all at once
  var fetchAll = useCallback(async function() {
    setLoading(true);
    var syms = stocksRef.current;
    var results = await Promise.all(syms.map(function(s){ return fetchQuote(s.symbol); }));
    var map = {};
    results.forEach(function(r){ if(r) map[r.symbol] = r; });
    setQuotes(map);
    setLastRefresh(new Date());
    setLoading(false);
  }, []);

  // On mount: full fetch, then rotate every 5s
  useEffect(function(){
    fetchAll();
    var t = setInterval(fetchOne, REFRESH_MS);
    return function(){ clearInterval(t); };
  }, []);

  // Re-fetch when stocks change
  useEffect(function(){
    fetchAll();
  }, [stocks.length]);

  // Ticker counter for display
  useEffect(function(){
    var t = setInterval(function(){ setTicker(function(n){ return n+1; }); }, 1000);
    return function(){ clearInterval(t); };
  }, []);

  function addStock() {
    var s = newSym.trim().toUpperCase();
    if(!s) return;
    if(stocks.find(function(x){ return x.symbol===s; })) { setNewSym(""); return; }
    setStocks(function(p){ return p.concat([{symbol:s,sector:newSec,halal:newHalal,note:"",flag:newFlag}]); }); setNewSec("Boshqa"); setNewHalal(null); setNewFlag("🇺🇸");
    setNewSym("");
    // Immediately fetch the new stock + auto flag
    fetchQuote(s).then(function(q){
      if(q){
        setQuotes(function(prev){ return Object.assign({}, prev, {[s]:q}); });
        if(q.flag){
          setStocks(function(prev){ return prev.map(function(st){
            return st.symbol===s ? Object.assign({},st,{flag:q.flag}) : st;
          });});
        }
      }
    });
  }
  function removeStock(sym) {
    setStocks(function(p){ return p.filter(function(s){ return s.symbol!==sym; }); });
    setQuotes(function(p){ var n=Object.assign({},p); delete n[sym]; return n; });
  }
  function updMeta(sym,key,val) {
    setStocks(function(p){ return p.map(function(s){ return s.symbol===sym?Object.assign({},s,{[key]:val}):s; }); });
  }

  var usedSectors = [];
  stocks.forEach(function(s){ if(s.sector&&usedSectors.indexOf(s.sector)<0) usedSectors.push(s.sector); });

  var visible = stocks
    .filter(function(s){ return s.symbol.indexOf(filter.toUpperCase())>=0; })
    .filter(function(s){ return sectorTab==="Hammasi"||s.sector===sectorTab; })
    .filter(function(s){
      if(halalTab==="Hammasi")   return true;
      if(halalTab==="Halol")     return s.halal===true;
      if(halalTab==="Not Halal") return s.halal===false;
      if(halalTab==="Noma'lum")  return s.halal===null;
      return true;
    })
    .sort(function(a,b){
      var qa=quotes[a.symbol],qb=quotes[b.symbol];
      if(sortKey==="symbol") return a.symbol.localeCompare(b.symbol)*sortDir;
      if(sortKey==="price")  return ((qa?qa.price:0)-(qb?qb.price:0))*sortDir;
      if(sortKey==="change") return ((qa?qa.changePct:0)-(qb?qb.changePct:0))*sortDir;
      if(sortKey==="sector") return (a.sector||"").localeCompare(b.sector||"")*sortDir;
      return 0;
    });


  var halalC = stocks.filter(function(s){ return s.halal===true; }).length;
  var haromC = stocks.filter(function(s){ return s.halal===false; }).length;
  var unknC  = stocks.length-halalC-haromC;

  function toggleSort(k){ if(sortKey===k) setSortDir(function(d){return d*-1;}); else{setSortKey(k);setSortDir(1);} }

  var css = [
    "@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap');",
    "*{box-sizing:border-box;}",
    "input::placeholder{color:"+T.textSub+";}",
    "::-webkit-scrollbar{width:3px;height:3px;}",
    "::-webkit-scrollbar-thumb{background:"+T.scrollbar+";border-radius:2px;}",
    "@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}",
    "@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}",
    ".shim{background-size:200% auto!important;animation:shimmer 5s linear infinite;}",
    "@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}",
    ".live-dot{animation:pulse 1.5s ease-in-out infinite;}",
  ].join(" ");

  function TabBtn(p){
    var c=p.color||(dark?"#a78bfa":"#6d28d9");
    return (
      <button onClick={p.onClick} style={{
        background:p.active?c+"20":"transparent",
        border:"1px solid "+(p.active?c:T.tabInact),
        color:p.active?c:T.tabInactC,
        borderRadius:20,padding:"4px 13px",fontSize:11,
        cursor:"pointer",whiteSpace:"nowrap",fontWeight:p.active?700:400,
      }}>{p.label}</button>
    );

  // Seconds since last refresh

  return (

      minHeight:"100vh",background:T.bg,

      <div style={{ maxWidth:780,margin:"0 auto" }}>

              var text = stocks.map(function(s){
                var q = quotes[s.symbol];
                return s.symbol + (q ? " $"+f2(q.price)+" ("+fp(q.changePct)+")" : "");
              }).join("\n");
              if(navigator.share){
                navigator.share({ title:"BT Watchlist", text: text });
              } else {
                navigator.clipboard && navigator.clipboard.writeText(text);
                alert("Nusxa olindi!");
              }
            }}
            style={{
              width:36, height:36, borderRadius:"50%",
              background:T.input, border:"1px solid "+T.cardBorder,
              color:T.textSub, cursor:"pointer",
              display:"flex", alignItems:"center", justifyContent:"center",
              transition:"all .3s", flexShrink:0,
            }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
          </button>
        </div>

        {/* ROWS */}
        <div>
        {visible.length===0 ? (
          <div style={{ textAlign:"center",color:T.emptyC,padding:60,fontSize:13 }}>{loading ? "Yuklanmoqda..." : filter ? "Qidiruv natijasi topilmadi." : "Aksiya topilmadi."}</div>
        ) : visible.map(function(s){
          return <StockRow key={s.symbol} q={quotes[s.symbol]} m={s} onRemove={function(){removeStock(s.symbol);}} upd={updMeta} T={T} dark={dark} />;
        })}

        </div>

        <div style={{ textAlign:"center",marginTop:24,fontSize:9,color:T.footerC,letterSpacing:1 }}>
          Yahoo Finance · Har {REFRESH_MS/1000}s da navbatma-navbat yangilanadi
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
