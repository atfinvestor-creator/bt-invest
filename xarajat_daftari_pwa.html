<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1829;
  --card: #221f35;
  --accent: #ff8906;
  --accent2: #f25f4c;
  --green: #2cb67d;
  --text: #fffffe;
  --muted: #a7a9be;
  --border: #2e2b45;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Nunito', sans-serif;
  display: flex;
  flex-direction: column;
}
/* Top bar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
  padding-top: calc(14px + env(safe-area-inset-top));
  flex-shrink: 0;
}
.topbar h1 {
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar .sub {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 2px;
  font-family: 'Courier New', monospace;
}
/* Summary row */
.summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sum-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  position: relative;
  overflow: hidden;
}
.sum-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
.sum-card.oylik::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.sum-card.bugun::before { background: linear-gradient(90deg, var(--green), #3de8a0); }
.sum-card .lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.sum-card .val { font-size: 1rem; font-weight: 700; font-family: 'Courier New', monospace; }
.sum-card.oylik .val { color: var(--accent); }
.sum-card.bugun .val { color: var(--green); }
/* Tabs */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 11px 8px;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
/* Screens */
.screen { display: none; flex: 1; overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }
/* Add screen */
.add-screen { padding: 16px; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-row { display: flex; gap: 10px; }
label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
input, select {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 12px;
  font-size: 1rem;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--accent); }
select { background-image: none; }
.btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 14px;
  color: white;
  font-size: 1.05rem;
  font-weight: 800;
  padding: 15px;
  width: 100%;
  cursor: pointer;
  margin-top: 4px;
  letter-spacing: 0.3px;
}
/* List screen */
.list-screen { padding: 0; }
.month-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.month-bar button { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 4px 10px; border-radius: 8px; }
.month-bar .mname { font-size: 0.95rem; font-weight: 800; }
.filter-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.filter-row::-webkit-scrollbar { display: none; }
.fpill {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.78rem;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  color: var(--muted);
  border: none;
}
.fpill.active { background: var(--accent); color: white; }
.expense-list { flex: 1; overflow-y: auto; padding: 8px 16px 80px; }
.day-header {
  display: flex;
  justify-content: space-between;
  padding: 10px 4px 6px;
  font-size: 0.73rem;
  color: var(--muted);
  font-family: 'Courier New', monospace;
}
.day-header .dsum { color: var(--accent); }
.expense-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.cat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.exp-info { flex: 1; min-width: 0; }
.exp-name { font-weight: 700; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-tag { display: inline-block; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; margin-top: 3px; font-weight: 700; }
.exp-amount { font-family: 'Courier New', monospace; font-size: 0.95rem; font-weight: 700; color: var(--accent2); white-space: nowrap; }
.del-btn { background: none; border: none; color: var(--border); font-size: 1.1rem; cursor: pointer; padding: 4px; border-radius: 6px; flex-shrink: 0; }
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty .emo { font-size: 2.5rem; margin-bottom: 10px; }
.empty p { font-size: 0.88rem; line-height: 1.7; }
/* Cat colors */
.ci-ovqat { background: rgba(255,137,6,0.15); }
.ci-transport { background: rgba(44,182,125,0.15); }
.ci-kiyim { background: rgba(104,109,224,0.15); }
.ci-uy { background: rgba(255,196,61,0.15); }
.ci-soglik { background: rgba(242,95,76,0.15); }
.ci-oyin { background: rgba(52,211,153,0.15); }
.ci-boshqa { background: rgba(167,169,190,0.15); }
.tg-ovqat { background: rgba(255,137,6,0.2); color: var(--accent); }
.tg-transport { background: rgba(44,182,125,0.2); color: var(--green); }
.tg-kiyim { background: rgba(104,109,224,0.2); color: #a29bfe; }
.tg-uy { background: rgba(255,196,61,0.2); color: #ffd32a; }
.tg-soglik { background: rgba(242,95,76,0.2); color: var(--accent2); }
.tg-oyin { background: rgba(52,211,153,0.2); color: #34d399; }
.tg-boshqa { background: rgba(167,169,190,0.2); color: var(--muted); }
/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 0.9rem;
  z-index: 999;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 24px rgba(44,182,125,0.4);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
/* Install banner */
.install-banner {
  background: linear-gradient(135deg, rgba(255,137,6,0.15), rgba(242,95,76,0.15));
  border: 1px solid rgba(255,137,6,0.3);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.install-banner .ib-text { flex: 1; font-size: 0.82rem; color: var(--muted); line-height: 1.4; }
.install-banner .ib-text strong { color: var(--accent); display: block; margin-bottom: 2px; }
.install-banner button {
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: white;
  padding: 8px 14px;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="topbar">
  <h1>📒 Xarajat Daftari</h1>
  <div class="sub" id="today-lbl"></div>
</div>
<div class="summary">
  <div class="sum-card oylik">
    <div class="lbl">Bu oy jami</div>
    <div class="val" id="month-total">0 so'm</div>
  </div>
  <div class="sum-card bugun">
    <div class="lbl">Bugun</div>
    <div class="val" id="day-total">0 so'm</div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('list', this)">📋 Xarajatlar</div>
  <div class="tab" onclick="showTab('add', this)">➕ Qo'shish</div>
</div>

<!-- LIST SCREEN -->
<div class="screen list-screen active" id="tab-list">
  <div class="month-bar">
    <button onclick="changeMonth(-1)">◀</button>
    <span class="mname" id="month-lbl"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>
  <div class="filter-row" id="filter-row">
    <button class="fpill active" onclick="setFilter('hammasi',this)">Hammasi</button>
    <button class="fpill" onclick="setFilter('ovqat',this)">🍽 Ovqat</button>
    <button class="fpill" onclick="setFilter('transport',this)">🚌 Transport</button>
    <button class="fpill" onclick="setFilter('kiyim',this)">👕 Kiyim</button>
    <button class="fpill" onclick="setFilter('uy',this)">🏠 Uy</button>
    <button class="fpill" onclick="setFilter('soglik',this)">💊 Sog'liq</button>
    <button class="fpill" onclick="setFilter('oyin',this)">🎮 O'yin</button>
    <button class="fpill" onclick="setFilter('boshqa',this)">📦 Boshqa</button>
  </div>
  <div class="expense-list" id="expense-list"></div>
</div>

<!-- ADD SCREEN -->
<div class="screen add-screen" id="tab-add">
  <div id="install-area"></div>
  <div class="form-group">
    <label>Nima uchun xarajat?</label>
    <input type="text" id="inp-name" placeholder="Masalan: Non sotib oldim" maxlength="50">
  </div>
  <div class="form-row">
    <div class="form-group" style="flex:1">
      <label>Miqdor (so'm)</label>
      <input type="number" id="inp-amount" placeholder="15000" inputmode="numeric">
    </div>
    <div class="form-group" style="flex:1">
      <label>Sana</label>
      <input type="date" id="inp-date">
    </div>
  </div>
  <div class="form-group">
    <label>Kategoriya</label>
    <select id="inp-cat">
      <option value="ovqat">🍽 Ovqat</option>
      <option value="transport">🚌 Transport</option>
      <option value="kiyim">👕 Kiyim</option>
      <option value="uy">🏠 Uy</option>
      <option value="soglik">💊 Sog'liq</option>
      <option value="oyin">🎮 O'yin-kulgi</option>
      <option value="boshqa">📦 Boshqa</option>
    </select>
  </div>
  <button class="btn-add" onclick="addExpense()">✅ Qo'shish</button>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
const ICONS = {ovqat:'🍽',transport:'🚌',kiyim:'👕',uy:'🏠',soglik:'💊',oyin:'🎮',boshqa:'📦'};
const LABELS = {ovqat:'Ovqat',transport:'Transport',kiyim:'Kiyim',uy:'Uy',soglik:"Sog'liq",oyin:"O'yin",boshqa:'Boshqa'};

let expenses = JSON.parse(localStorage.getItem('xarajatlar_v2') || '[]');
let filter = 'hammasi';
let now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();
let deferredPrompt = null;

function save() { localStorage.setItem('xarajatlar_v2', JSON.stringify(expenses)); }
function fmt(n) { return Number(n).toLocaleString('uz-UZ') + " so'm"; }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// PWA install
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const area = document.getElementById('install-area');
  area.innerHTML = '<div class="install-banner"><div class="ib-text"><strong>📲 Ilovani o\'rnating!</strong>Telefon ekraniga qo\'shib, offline ishlatish</div><button onclick="installPWA()">O\'rnatish</button></div>';
}

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    if (r.outcome === 'accepted') showToast('✅ Ilova o\'rnatildi!');
    deferredPrompt = null;
    document.getElementById('install-area').innerHTML = '';
  });
}

function showTab(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

function changeMonth(d) {
  viewMonth += d;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderList();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.fpill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function addExpense() {
  const name = document.getElementById('inp-name').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const cat = document.getElementById('inp-cat').value;
  const date = document.getElementById('inp-date').value;
  if (!name) { showToast('❗ Nima uchun ekanini yozing!', true); return; }
  if (!amount || amount <= 0) { showToast('❗ Miqdorni kiriting!', true); return; }
  if (!date) { showToast('❗ Sanani tanlang!', true); return; }
  expenses.unshift({ id: Date.now(), name, amount, cat, date });
  save();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-amount').value = '';
  renderList();
  showToast('✅ Qo\'shildi!');
  showTab('list', document.querySelector('.tab'));
}

function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  save();
  renderList();
}

function renderList() {
  document.getElementById('month-lbl').textContent = MONTHS[viewMonth] + ' ' + viewYear;
  const today = todayStr();
  let monthly = expenses.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });
  document.getElementById('month-total').textContent = fmt(monthly.reduce((s,e)=>s+e.amount,0));
  document.getElementById('day-total').textContent = fmt(expenses.filter(e=>e.date===today).reduce((s,e)=>s+e.amount,0));
  if (filter !== 'hammasi') monthly = monthly.filter(e => e.cat === filter);
  const list = document.getElementById('expense-list');
  if (!monthly.length) {
    list.innerHTML = '<div class="empty"><div class="emo">🗒️</div><p>Bu oyda xarajat yo\'q.<br>Qo\'shish tabiga o\'ting!</p></div>';
    return;
  }
  monthly.sort((a,b)=>b.date.localeCompare(a.date));
  const groups = {};
  monthly.forEach(e => { if(!groups[e.date])groups[e.date]=[]; groups[e.date].push(e); });
  let html = '';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date => {
    const d = new Date(date);
    const lbl = date===today?'Bugun':d.getDate()+' '+MONTHS[d.getMonth()];
    const ds = groups[date].reduce((s,e)=>s+e.amount,0);
    html += '<div class="day-header"><span>'+lbl+'</span><span class="dsum">'+fmt(ds)+'</span></div>';
    groups[date].forEach(e => {
      html += '<div class="expense-item"><div class="cat-icon ci-'+e.cat+'">'+ICONS[e.cat]+'</div><div class="exp-info"><div class="exp-name">'+esc(e.name)+'</div><span class="exp-tag tg-'+e.cat+'">'+LABELS[e.cat]+'</span></div><div class="exp-amount">−'+fmt(e.amount)+'</div><button class="del-btn" onclick="deleteExpense('+e.id+')">🗑</button></div>';
    });
  });
  list.innerHTML = html;
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#f25f4c' : '#2cb67d';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
const today = new Date();
document.getElementById('today-lbl').textContent = today.getDate()+' '+MONTHS[today.getMonth()]+' '+today.getFullYear();
document.getElementById('inp-date').value = todayStr();
renderList();

// Service Worker for offline
if ('serviceWorker' in navigator) {
  const swCode = `
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open('xarajat-v1').then(c => c.addAll(['/']))
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
